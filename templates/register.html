<!DOCTYPE html>
<html lang="en">
<head>
    <title>VTU Sign Up</title>
    <style>
        :root { --primary: #0f172a; --accent: #4f46e5; --accent-hover: #4338ca; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 450px; padding: 2.5rem; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; }
        button.btn { background: var(--accent); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button.btn:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 style="margin-bottom: 0.5rem; font-weight: 800; color: var(--primary);">Create Account</h2>
        <p style="color: var(--muted); margin-bottom: 2rem;">Sign up and choose your workspace role</p>

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose username">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@vtu.edu">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Set strong password">
            </div>
            <div class="form-group">
                <label>Define Account Role</label>
                <select name="role" class="form-control" required>
                    <option value="candidate">Candidate (Self-Profile Manager)</option>
                    <option value="recruiter">Recruiter (Pending Admin Approval)</option>
                </select>
            </div>
            <button type="submit" class="btn">Register Profile</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.9rem;">
            Registered already? <a href="/login" style="color: var(--accent); font-weight: 600; text-decoration: none;">Sign In</a>
        </p>
    </div>
</body>
</html>
