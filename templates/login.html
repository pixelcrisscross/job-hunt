<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VTU Portal | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f172a;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-glow: rgba(79, 70, 229, 0.2);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --error-bg: #fef2f2;
            --error-text: #b91c1c;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 50%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* animated background ornament */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(79, 70, 229, 0.06) 0%, transparent 55%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            z-index: 2;
        }

        .auth-container:hover {
            box-shadow: 0 30px 50px -18px rgba(0, 0, 0, 0.2);
        }

        /* Header branding */
        .brand-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #4f46e5, #6366f1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 12px 20px -8px rgba(79, 70, 229, 0.35);
        }

        .logo-circle i {
            font-size: 2rem;
            color: white;
        }

        .auth-container h2 {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.4px;
            background: linear-gradient(120deg, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .welcome-sub {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Form styling premium */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: var(--accent);
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            transition: all 0.2s ease;
            background: #ffffff;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* password toggle (interactive) */
        .toggle-password {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        button.btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.3);
            margin-top: 0.5rem;
        }

        button.btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -6px rgba(79, 70, 229, 0.45);
        }

        button.btn:active {
            transform: translateY(1px);
        }

        /* Alerts */
        .alert {
            padding: 0.9rem 1rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
            border-left: 4px solid;
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-text);
            border-left-color: #ef4444;
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-left-color: #10b981;
        }

        .alert i {
            font-size: 1.1rem;
        }

        /* signup link */
        .signup-link {
            margin-top: 1.8rem;
            text-align: center;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.85rem;
        }

        .signup-link a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .signup-link a:hover {
            color: var(--accent-hover);
            gap: 8px;
        }

        /* decorative elements */
        .deco-dots {
            position: absolute;
            bottom: 30px;
            left: 30px;
            opacity: 0.3;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .auth-container {
                padding: 1.8rem 1.5rem;
                margin: 1rem;
            }
            .brand-header h2 {
                font-size: 1.6rem;
            }
        }

        /* animated input suggestion glow */
        @keyframes subtlePulse {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.1);}
            100% { box-shadow: 0 0 0 4px rgba(79, 70, 229, 0);}
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand-header">
            <div class="logo-circle">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2>VTU Access Hub</h2>
            <p class="welcome-sub">Secure login to recruitment ecosystem</p>
        </div>

        <!-- Flash messages with modern styling -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'error' }}">
                        <i class="{% if category == 'success' %}bi bi-check-circle-fill{% else %}bi bi-exclamation-triangle-fill{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="loginForm">
            <div class="form-group">
                <label><i class="bi bi-person-circle"></i> Username / Email</label>
                <input type="text" name="username" class="form-control" required placeholder="recruiter@example.com or vtu_id" autocomplete="username">
            </div>

            <div class="form-group">
                <label><i class="bi bi-key-fill"></i> Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="passwordField" class="form-control" required placeholder="Enter your secure password" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Show password">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="bi bi-box-arrow-in-right"></i> Sign in
            </button>
        </form>

        <div class="signup-link">
            <span>No account yet?</span>
            <a href="/register">
                Create an account <i class="bi bi-arrow-right-short"></i>
            </a>
        </div>
        <div class="deco-dots">
            <i class="bi bi-dot"></i> <i class="bi bi-dot"></i> <i class="bi bi-dot"></i>
        </div>
    </div>

    <script>
        (function() {
            // Toggle password visibility with modern eye icon
            const toggleBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('passwordField');
            
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    // toggle icon eye/eye-slash
                    const icon = toggleBtn.querySelector('i');
                    if (icon) {
                        if (type === 'text') {
                            icon.classList.remove('bi-eye-slash');
                            icon.classList.add('bi-eye');
                        } else {
                            icon.classList.remove('bi-eye');
                            icon.classList.add('bi-eye-slash');
                        }
                    }
                });
            }

            // Optional: subtle floating label + auto-remove flash messages after 4 seconds
            const alerts = document.querySelectorAll('.alert');
            if (alerts.length) {
                setTimeout(() => {
                    alerts.forEach(alert => {
                        alert.style.transition = 'opacity 0.4s ease';
                        alert.style.opacity = '0';
                        setTimeout(() => {
                            if(alert.parentNode) alert.remove();
                        }, 400);
                    });
                }, 4000);
            }

            // Simple validation enhancement: prevent empty submits with shake effect (optional)
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    const username = loginForm.querySelector('input[name="username"]');
                    const password = loginForm.querySelector('input[name="password"]');
                    if (!username.value.trim() || !password.value.trim()) {
                        e.preventDefault();
                        // create a quick temporary alert for empty fields if needed
                        const container = document.querySelector('.auth-container');
                        const existingAlert = container.querySelector('.alert-warning-custom');
                        if(existingAlert) existingAlert.remove();
                        const warningDiv = document.createElement('div');
                        warningDiv.className = 'alert alert-error';
                        warningDiv.style.marginTop = '0.5rem';
                        warningDiv.innerHTML = '<i class="bi bi-info-circle-fill"></i> Both username and password are required.';
                        const formElement = document.getElementById('loginForm');
                        formElement.parentNode.insertBefore(warningDiv, formElement);
                        setTimeout(() => warningDiv.remove(), 2500);
                    }
                });
            }
        })();
    </script>
</body>
</html>
